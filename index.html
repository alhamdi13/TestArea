<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alat Migrasi Firebase</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-gray-50 text-gray-800 font-sans">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-2">Alat Tarik Data Firebase</h1>
        <p class="mb-6 text-gray-600">Alat ini menyalin data Anda dari database lama ke format tabel Google Sheets.</p>
        
        <div id="login-section" class="bg-white p-6 border rounded shadow mb-6">
            <h2 class="font-bold mb-4">Langkah 1 Login Firebase</h2>
            <div class="flex gap-4 items-center">
                <input type="email" id="login-email" placeholder="Email Admin" class="border p-2 rounded w-64">
                <input type="password" id="login-password" placeholder="Password Admin" class="border p-2 rounded w-64">
                <button id="btn-login" class="bg-blue-800 text-white px-6 py-2 rounded font-medium">Masuk</button>
            </div>
            <p id="login-status" class="text-sm mt-3 text-blue-600"></p>
        </div>

        <div id="action-section" class="bg-white p-6 border rounded shadow mb-6 hidden">
            <h2 class="font-bold mb-4">Langkah 2 Pilih Data</h2>
            <div class="flex gap-4">
                <button id="btn-anggota" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-medium transition-colors">Tarik Data Anggota</button>
                <button id="btn-transaksi" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-medium transition-colors">Tarik Data Transaksi</button>
            </div>
        </div>

        <div id="output-container" class="bg-white p-6 border rounded shadow overflow-auto hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 id="table-title" class="font-bold text-lg">Pratinjau Data</h2>
                <button id="btn-copy" class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded text-sm font-medium transition-colors">Salin Tabel</button>
            </div>
            <p id="copy-status" class="text-green-600 text-sm mb-2 text-right hidden">Tabel berhasil disalin</p>
            <div class="overflow-x-auto">
                <table id="data-table" class="w-full text-left border-collapse border border-gray-300 text-sm">
                    <thead id="table-head" class="bg-gray-100"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5oAiObdlEnDyWJzrdIqfeitv4GzOZ72U",
            authDomain: "koperasi-k1kata.firebaseapp.com",
            projectId: "koperasi-k1kata",
            storageBucket: "koperasi-k1kata.firebasestorage.app",
            messagingSenderId: "426088050905",
            appId: "1:426088050905:web:efd48f8ab64dd80ed08ec8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const btnLogin = document.getElementById('btn-login');
        const btnAnggota = document.getElementById('btn-anggota');
        const btnTransaksi = document.getElementById('btn-transaksi');
        const btnCopy = document.getElementById('btn-copy');
        
        const loginSection = document.getElementById('login-section');
        const actionSection = document.getElementById('action-section');
        const outputContainer = document.getElementById('output-container');
        const tableHead = document.getElementById('table-head');
        const tableBody = document.getElementById('table-body');
        const tableTitle = document.getElementById('table-title');
        const copyStatus = document.getElementById('copy-status');
        const loginStatus = document.getElementById('login-status');

        btnLogin.addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            btnLogin.textContent = "Memproses...";
            loginStatus.textContent = "";
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                loginSection.classList.add('hidden');
                actionSection.classList.remove('hidden');
            } catch (error) {
                loginStatus.textContent = "Autentikasi gagal periksa kembali email dan password Anda.";
                btnLogin.textContent = "Masuk";
            }
        });

        btnAnggota.addEventListener('click', async () => {
            btnAnggota.textContent = "Memuat Data...";
            tableHead.innerHTML = '<tr><th class="border border-gray-300 p-2">ID</th><th class="border border-gray-300 p-2">Nama</th><th class="border border-gray-300 p-2">Email</th><th class="border border-gray-300 p-2">No Anggota</th><th class="border border-gray-300 p-2">Bergabung</th><th class="border border-gray-300 p-2">Simpanan Pokok</th><th class="border border-gray-300 p-2">Simpanan Wajib</th><th class="border border-gray-300 p-2">Simpanan Sukarela</th></tr>';
            tableBody.innerHTML = '';
            
            try {
                const snapshot = await getDocs(collection(db, "users"));
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="border border-gray-300 p-2">${doc.id}</td>
                        <td class="border border-gray-300 p-2">${data.nama || ''}</td>
                        <td class="border border-gray-300 p-2">${data.email || ''}</td>
                        <td class="border border-gray-300 p-2">${data.noAnggota || data.password || ''}</td>
                        <td class="border border-gray-300 p-2">${data.bergabung || ''}</td>
                        <td class="border border-gray-300 p-2">${data.simpananPokok || 0}</td>
                        <td class="border border-gray-300 p-2">${data.simpananWajib || 0}</td>
                        <td class="border border-gray-300 p-2">${data.simpananSukarela || 0}</td>
                    `;
                    tableBody.appendChild(row);
                });
                tableTitle.textContent = "Data Anggota";
                outputContainer.classList.remove('hidden');
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="8" class="p-4 text-red-600">Terjadi kendala saat menarik data anggota.</td></tr>';
            }
            btnAnggota.textContent = "Tarik Data Anggota";
        });

        btnTransaksi.addEventListener('click', async () => {
            btnTransaksi.textContent = "Memuat Data...";
            tableHead.innerHTML = '<tr><th class="border border-gray-300 p-2">ID Transaksi</th><th class="border border-gray-300 p-2">Tanggal</th><th class="border border-gray-300 p-2">ID Anggota</th><th class="border border-gray-300 p-2">Nama Anggota</th><th class="border border-gray-300 p-2">Jenis</th><th class="border border-gray-300 p-2">Jumlah</th><th class="border border-gray-300 p-2">Keterangan</th><th class="border border-gray-300 p-2">Admin</th></tr>';
            tableBody.innerHTML = '';
            
            try {
                const snapshot = await getDocs(collection(db, "transactions"));
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    let tanggalFormat = '';
                    if (data.timestamp) {
                        tanggalFormat = data.timestamp.toDate().toLocaleDateString('id-ID');
                    }
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="border border-gray-300 p-2">${doc.id}</td>
                        <td class="border border-gray-300 p-2">${tanggalFormat}</td>
                        <td class="border border-gray-300 p-2">${data.userId || data.idAnggota || ''}</td>
                        <td class="border border-gray-300 p-2">${data.namaAnggota || ''}</td>
                        <td class="border border-gray-300 p-2">${data.jenis || ''}</td>
                        <td class="border border-gray-300 p-2">${data.jumlah || 0}</td>
                        <td class="border border-gray-300 p-2">${data.keterangan || ''}</td>
                        <td class="border border-gray-300 p-2">${data.adminId || data.admin || ''}</td>
                    `;
                    tableBody.appendChild(row);
                });
                tableTitle.textContent = "Data Transaksi";
                outputContainer.classList.remove('hidden');
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="8" class="p-4 text-red-600">Terjadi kendala saat menarik data transaksi.</td></tr>';
            }
            btnTransaksi.textContent = "Tarik Data Transaksi";
        });

        btnCopy.addEventListener('click', () => {
            const table = document.getElementById('data-table');
            const range = document.createRange();
            range.selectNode(table);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            
            copyStatus.classList.remove('hidden');
            setTimeout(() => {
                copyStatus.classList.add('hidden');
            }, 3000);
        });
    </script>
</body>
</html>
