<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Search, SlidersHorizontal, ChevronRight, Home, Users, Map as MapIcon,
      Calendar, User, Briefcase, MapPin, Phone, Mail, X, Plus, Minus, LocateFixed,
      Navigation, TrendingUp, CalendarDays, Building2, KeyRound,
      Send, Edit2, CheckCircle2, Save, LogOut, Loader2, UploadCloud, Lock, Key,
      Ticket, Copy, BarChart2, QrCode, Scan, XCircle, RefreshCw, Edit
    } from 'lucide-react';

    const API_URL = "https://script.google.com/macros/s/AKfycbyWmcG_gyhGUbWEiS-uvXhaA0LcqIx5raAh9hGMmKomxj2OJxFykUgKDZDIcOQbF-H4/exec";

    const VOTING_START_DATE = new Date("2026-03-15T15:00:00+07:00").getTime();
    const VOTING_END_DATE = new Date("2026-03-15T16:00:00+07:00").getTime();

    const getDriveImageLink = (url) => {
      if (!url) return null;
      const strUrl = String(url).trim();
      const match = strUrl.match(/(?:id=|file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/);
      if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w800`;
      if (strUrl.startsWith('http')) return strUrl;
      return null;
    };

    const getInitials = (name) => {
      if (!name) return 'AL';
      return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    };

    const getRegionInfo = (alumni) => {
      let s = String(alumni.domisili || '').toLowerCase();

      if (!s || s === 'undefined' || s.trim() === '') return { id: 'belum_ada', name: 'Belum Ada Data', lat: 0, lng: 0 };

      if (s.match(/freeport|timika|tembagapura|mimika|papua tengah|nabire/)) return { id: 'papua_tengah', name: 'Timika / Tembagapura', lat: -4.2699, lng: 136.9350 };
      if (s.match(/jayapura|merauke|biak|keerom|papua/)) return { id: 'papua', name: 'Papua', lat: -2.5337, lng: 140.7181 };
      if (s.match(/sorong|manokwari|bintuni|fakfak|papua barat|berau macaque/)) return { id: 'papua_barat', name: 'Papua Barat', lat: -0.8615, lng: 134.0620 };
      if (s.match(/halmahera|weda|obi|ternate|tidore|maluku utara|malut|nhm|iwip|bacan|morotai/)) return { id: 'malut', name: 'Maluku Utara', lat: 0.2833, lng: 127.9167 };
      if (s.match(/ambon|tual|buru|seram|maluku/)) return { id: 'maluku', name: 'Maluku', lat: -3.2385, lng: 130.1453 };
      if (s.match(/morowali|palu|luwuk|banggai|donggala|poso|sulawesi tengah|sulteng|imip|ptimip/)) return { id: 'sulteng', name: 'Sulawesi Tengah (Morowali)', lat: -2.5694, lng: 121.9547 };
      if (s.match(/konawe|kendari|pomalaa|kolaka|bombana|buton|sulawesi tenggara|sultra|vdni|oss|antam/)) return { id: 'sultra', name: 'Sulawesi Tenggara (Konawe)', lat: -4.0198, lng: 122.5053 };
      if (s.match(/sorowako|luwu|makassar|parepare|palopo|bone|gowa|bantaeng|huadi|sulawesi selatan|sulsel|vale/)) return { id: 'sulsel', name: 'Sulawesi Selatan (Sorowako)', lat: -2.5310, lng: 121.3533 };
      if (s.match(/manado|bitung|minahasa|tomohon|sulawesi utara|sulut/)) return { id: 'sulut', name: 'Sulawesi Utara', lat: 1.4931, lng: 124.8413 };
      if (s.match(/gorontalo|pohuwato|bone bolango/)) return { id: 'gorontalo', name: 'Gorontalo', lat: 0.5435, lng: 123.0568 };
      if (s.match(/mamuju|majene|polewali|sulawesi barat|sulbar/)) return { id: 'sulbar', name: 'Sulawesi Barat', lat: -2.6787, lng: 118.8888 };
      if (s.match(/tarakan|bulungan|malinau|nunukan|tana tidung|kalimantan utara|kaltara/)) return { id: 'kaltara', name: 'Kalimantan Utara', lat: 3.0731, lng: 117.6186 };
      if (s.match(/berau|kpc|sangatta|kutai timur|kutim/)) return { id: 'kaltim_utara', name: 'Kaltim (Berau & Sangatta)', lat: 1.5, lng: 117.5 };
      if (s.match(/balikpapan|samarinda|bontang|penajam|paser|kukar|kutai kartanegara|kalimantan timur|kaltim|kideco/)) return { id: 'kaltim_selatan', name: 'Kaltim (Balikpapan & Sekitar)', lat: -1.1, lng: 116.8 };
      if (s.match(/banjarmasin|banjarbaru|kotabaru|tanah bumbu|batulicin|tabalong|tapin|pelaihari|kalimantan selatan|kalsel|adaro|arutmin|antang|jorong|bib|bss/)) return { id: 'kalsel', name: 'Kalimantan Selatan', lat: -2.1833, lng: 115.4667 };
      if (s.match(/palangkaraya|sampit|pangkalan bun|murung raya|barito|kotawaringin|kalimantan tengah|kalteng|adaro metcoal/)) return { id: 'kalteng', name: 'Kalimantan Tengah', lat: -1.5845, lng: 113.5623 };
      if (s.match(/pontianak|singkawang|ketapang|sanggau|sintang|kapuas hulu|kalimantan barat|kalbar|whw/)) return { id: 'kalbar', name: 'Kalimantan Barat', lat: -0.0227, lng: 109.3425 };
      if (s.match(/mataram|sumbawa|dompu|bima|ntb|amman|amnt|batu hijau/)) return { id: 'ntb', name: 'Nusa Tenggara Barat', lat: -8.6500, lng: 117.3616 };
      if (s.match(/kupang|ende|flores|sumba|manggarai|ntt/)) return { id: 'ntt', name: 'Nusa Tenggara Timur', lat: -9.8956, lng: 123.5986 };
      if (s.match(/bali|denpasar|badung|gianyar|singaraja/)) return { id: 'bali', name: 'Bali', lat: -8.4095, lng: 115.1889 };
      if (s.match(/surabaya|malang|gresik|sidoarjo|banyuwangi|jember|kediri|madiun|tuban|bojonegoro|pasuruan|mojokerto|probolinggo|jawa timur|jatim|freeport gresik|smelting/)) return { id: 'jatim', name: 'Jawa Timur', lat: -7.2504, lng: 112.7688 };
      if (s.match(/semarang|solo|surakarta|boyolali|tegal|pekalongan|kudus|jepara|cilacap|banyumas|purwokerto|magelang|jawa tengah|jateng/)) return { id: 'jateng', name: 'Jawa Tengah', lat: -7.1509, lng: 110.1402 };
      if (s.match(/yogyakarta|jogja|diy|sleman|bantul|gunungkidul/)) return { id: 'diy', name: 'DI Yogyakarta', lat: -7.7956, lng: 110.3695 };
      if (s.match(/bandung|bogor|bekasi|depok|cirebon|indramayu|karawang|purwakarta|subang|sukabumi|tasikmalaya|garut|cimahi|jawa barat|jabar|antam pongkor/)) return { id: 'jabar', name: 'Jawa Barat', lat: -6.9147, lng: 107.6098 };
      if (s.match(/banten|cilegon|serang|tangerang|lebak|pandeglang|krakatau/)) return { id: 'banten', name: 'Banten', lat: -6.4058, lng: 106.0640 };
      if (s.match(/jakarta|dki|jabodetabek/)) return { id: 'jakarta', name: 'DKI Jakarta', lat: -6.2088, lng: 106.8456 };
      if (s.match(/tanjung enim|palembang|lahat|muara enim|prabumulih|lubuklinggau|banyuasin|ogan ilir|sumsel|sumatra selatan|sumatera selatan|ptba|bukit asam|sriwijaya/)) return { id: 'sumsel', name: 'Sumatera Selatan', lat: -3.7431, lng: 103.7849 };
      if (s.match(/bandar lampung|lampung|metro|tulang bawang|way kanan/)) return { id: 'lampung', name: 'Lampung', lat: -5.4500, lng: 105.2667 };
      if (s.match(/pangkal pinang|bangka|belitung|sungailiat|muntok|babel|timah/)) return { id: 'babel', name: 'Bangka Belitung', lat: -2.1325, lng: 106.1122 };
      if (s.match(/bengkulu|rejang lebong|mukomuko|lebong/)) return { id: 'bengkulu', name: 'Bengkulu', lat: -3.7928, lng: 102.2608 };
      if (s.match(/jambi|bungo|merangin|sarolangun|kerinci/)) return { id: 'jambi', name: 'Jambi', lat: -1.5901, lng: 103.6128 };
      if (s.match(/pekanbaru|dumai|pelalawan|siak|bengkalis|rokan|kampar|riau|chevron|phr/)) return { id: 'riau', name: 'Riau', lat: 0.5071, lng: 101.4451 };
      if (s.match(/batam|tanjung pinang|bintan|karimun|natuna|kepri|kepulauan riau/)) return { id: 'kepri', name: 'Kepulauan Riau', lat: 1.0456, lng: 104.0305 };
      if (s.match(/padang|bukittinggi|sawahlunto|pariaman|solok|pasaman|agam|dharmasraya|sijunjung|pesisir selatan|tanah datar|payakumbuh|sumatra barat|sumatera barat|sumbar|semen padang/)) return { id: 'sumbar', name: 'Sumatera Barat', lat: -0.9471, lng: 100.4172 };
      if (s.match(/medan|binjai|siantar|asahan|deli serdang|karo|tapanuli|nias|sumatra utara|sumatera utara|sumut|agincourt|martabe/)) return { id: 'sumut', name: 'Sumatera Utara', lat: 3.5952, lng: 98.6722 };
      if (s.match(/aceh|lhokseumawe|langsa|meulaboh|pidie|mifa/)) return { id: 'aceh', name: 'Aceh', lat: 4.6951, lng: 96.8209 };

      return { id: 'lainnya', name: 'Lokasi Lainnya', lat: -0.7893, lng: 113.9213 };
    };

    const MapView = ({ locationGroups, selectedLocation, setSelectedLocation }) => {
      const mapRef = React.useRef(null);
      const mapInstance = React.useRef(null);
      const markersRef = React.useRef({});

      const handleZoomIn = () => { if (mapInstance.current) mapInstance.current.zoomIn(); };
      const handleZoomOut = () => { if (mapInstance.current) mapInstance.current.zoomOut(); };
      const handleLocateCenter = () => {
        if (mapInstance.current) mapInstance.current.flyTo([-2.5489, 118.0149], 5, { duration: 0.5 });
        setSelectedLocation(null);
      };

      React.useEffect(() => {
        if (!mapRef.current) return;

        if (!mapInstance.current) {
          mapInstance.current = L.map(mapRef.current, {
            zoomControl: false,
            attributionControl: false
          }).setView([-2.5489, 118.0149], 5);

          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: ''
          }).addTo(mapInstance.current);
        }

        Object.values(markersRef.current).forEach(m => {
          if (m) mapInstance.current.removeLayer(m);
        });
        markersRef.current = {};

        locationGroups.forEach((group, idx) => {
          const isActive = selectedLocation?.name === group.name;

          const iconSize = isActive ? [46, 46] : [36, 36];
          const iconAnchor = isActive ? [23, 23] : [18, 18];
          const bgColor = isActive ? '#D4AF37' : '#5D4C8C';

          const iconHtml = `<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background-color: ${bgColor}; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.3); color: white; font-weight: bold; font-size: 14px; transition: all 0.3s ease;">
               ${group.alumni.length}
             </div>`;

          const icon = L.divIcon({
            html: iconHtml,
            className: 'custom-leaflet-marker',
            iconSize: iconSize,
            iconAnchor: iconAnchor
          });

          const marker = L.marker(group.coordinates, { icon }).addTo(mapInstance.current);
          marker.on('click', () => setSelectedLocation(group));

          const tooltipContent = '<div class="text-center"><div class="font-bold text-gray-800">' + group.name + '</div><div class="text-xs text-gray-500 mt-0.5">' + group.alumni.length + ' Alumni Terdaftar</div></div>';

          marker.bindTooltip(tooltipContent, {
            direction: 'top',
            offset: [0, -10],
            opacity: 0.9,
            className: 'shadow-lg rounded-lg border-none px-3 py-2 bg-white'
          });

          markersRef.current[idx] = marker;
        });

      }, [locationGroups, selectedLocation]);

      React.useEffect(() => {
        if (selectedLocation && mapInstance.current) {
          mapInstance.current.flyTo(selectedLocation.coordinates, 8, { duration: 0.5 });
        }
      }, [selectedLocation]);

      return (
        <React.Fragment>
          <div className="absolute right-4 top-4 flex flex-col gap-2 z-[400]">
            <button onClick={handleZoomIn} className="w-10 h-10 bg-white rounded-lg shadow-lg flex items-center justify-center text-gray-700 hover:bg-gray-50"><Plus size={20} /></button>
            <button onClick={handleZoomOut} className="w-10 h-10 bg-white rounded-lg shadow-lg flex items-center justify-center text-gray-700 hover:bg-gray-50"><Minus size={20} /></button>
            <button onClick={handleLocateCenter} className="w-10 h-10 bg-white rounded-lg shadow-lg flex items-center justify-center text-[#5D4C8C] mt-2"><LocateFixed size={20} /></button>
          </div>
          <div ref={mapRef} style={{ width: '100%', height: '100%', zIndex: 0 }} />
        </React.Fragment>
      );
    };

    function App() {
      const [alumniData, setAlumniData] = useState([]);
      const [eventsData, setEventsData] = useState([]);
      const [voteTally, setVoteTally] = useState({ "1": 0, "2": 0 });
      const [isLoading, setIsLoading] = useState(true);
      const [currentPage, setCurrentPage] = useState('home');
      const [searchTerm, setSearchTerm] = useState('');
      const [activeChip, setActiveChip] = useState('All');

      const [currentUser, setCurrentUser] = useState({ role: 'guest', data: null, hasVoted: false, qrCode: '' });
      const [authForm, setAuthForm] = useState({ phone: '', password: '', nama: '', email: '', step: 'login', recoveredPass: '' });
      const [toastMsg, setToastMsg] = useState('');

      const [selectedAlumni, setSelectedAlumni] = useState(null);
      const [selectedLocation, setSelectedLocation] = useState(null);
      const [isEditingProfile, setIsEditingProfile] = useState(false);
      const [editFormData, setEditFormData] = useState({});
      const [isAddingEvent, setIsAddingEvent] = useState(false);
      const [eventFormData, setEventFormData] = useState({ title: '', date: '', time: '', location: '', type: 'Organisasi' });
      const [isUploadingPhoto, setIsUploadingPhoto] = useState(false);
      const [voteModal, setVoteModal] = useState(null);

      const [filterAngkatan, setFilterAngkatan] = useState('Semua Angkatan');
      const [rsvpStatus, setRsvpStatus] = useState({});
      const [rsvpCounts, setRsvpCounts] = useState({});
      
      const [isScannerOpen, setIsScannerOpen] = useState(false);
      const [scanResult, setScanResult] = useState(null);

      const uniqueAngkatan = useMemo(() => {
        const angkatanSet = new Set(alumniData.map(a => String(a.angkatan).trim()).filter(a => a && a !== "undefined"));
        return ['Semua Angkatan', ...Array.from(angkatanSet).sort((a, b) => b.localeCompare(a))];
      }, [alumniData]);

      const chips = ['All', 'Tambang', 'Non-Tambang', 'Sumatera Barat', 'Sumatera Selatan'];

      const [nowTime, setNowTime] = useState(Date.now());
      useEffect(() => {
        const interval = setInterval(() => setNowTime(Date.now()), 10000); 
        return () => clearInterval(interval);
      }, []);

      const isVotingUpcoming = nowTime < VOTING_START_DATE;
      const isVotingOpen = nowTime >= VOTING_START_DATE && nowTime <= VOTING_END_DATE;
      const isVotingClosed = nowTime > VOTING_END_DATE;

      useEffect(() => {
        fetch(API_URL)
          .then(res => res.json())
          .then(data => {
            if (data.status === "success") {
              setAlumniData(data.alumni || []);
              setEventsData(data.events || []);
              if(data.voteTally) setVoteTally(data.voteTally);
              if(data.rsvpCounts) setRsvpCounts(data.rsvpCounts);
            }
            setIsLoading(false);
          })
          .catch(err => {
            console.error(err);
            setIsLoading(false);
            showToast("Gagal mengambil data dari Google Sheets");
          });
      }, [currentPage]); 

      useEffect(() => {
        if (isScannerOpen && !scanResult) {
            const scanner = new Html5QrcodeScanner(
                "reader",
                { fps: 10, qrbox: { width: 250, height: 250 } },
                false
            );

            scanner.render(
                (decodedText) => {
                    scanner.clear();
                    handleScanSuccess(decodedText);
                },
                (error) => {
                }
            );

            return () => {
                scanner.clear().catch(e => console.log("Gagal membersihkan scanner", e));
            };
        }
      }, [isScannerOpen, scanResult]);

      const handleScanSuccess = async (qrData) => {
        let parsedData;
        try {
          parsedData = JSON.parse(qrData);
          if (!parsedData.hp || !parsedData.nama) throw new Error("Format Tidak Valid");
        } catch (err) {
          setScanResult({ 
            success: false, 
            name: 'Akses Ditolak', 
            message: 'QR Code tidak valid. Harap gunakan QR dari menu Akun aplikasi.' 
          });
          return;
        }

        setScanResult({ loading: true, name: parsedData.nama, success: false, message: 'Memverifikasi dan mencatat kehadiran...' });
        
        try {
          const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              action: 'recordAttendance', 
              qrData: parsedData.hp,
              nama: parsedData.nama,
              timestamp: new Date().toISOString()
            })
          });
          const result = await res.json();
          
          if (result.status === 'success') {
            setScanResult({ 
              success: true, 
              name: result.name || parsedData.nama, 
              message: result.message || 'Kehadiran berhasil dikonfirmasi!' 
            });
          } else {
            setScanResult({ 
              success: false, 
              name: result.name || parsedData.nama, 
              message: result.message || 'Gagal mencatat kehadiran.' 
            });
          }
        } catch (err) {
          setScanResult({ success: false, name: parsedData.nama, message: 'Koneksi bermasalah. Coba lagi.' });
        }
      };

      const filteredData = useMemo(() => {
        return alumniData.filter(alumni => {
          const matchSearch = String(alumni.nama || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
            String(alumni.perusahaan || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
            String(alumni.site || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
            String(alumni.domisili || '').toLowerCase().includes(searchTerm.toLowerCase());

          let matchAngkatan = filterAngkatan === 'Semua Angkatan' || String(alumni.angkatan).trim() === filterAngkatan;

          let matchChip = true;
          if (activeChip !== 'All') {
            if (activeChip === 'Tambang') matchChip = alumni.sesuaiBidang === 'YA';
            else if (activeChip === 'Non-Tambang') matchChip = alumni.sesuaiBidang === 'TIDAK';
            else if (activeChip === 'Sumatera Barat') matchChip = String(alumni.domisili).includes('Sumatera Barat') || String(alumni.site).includes('Sumatera Barat');
            else if (activeChip === 'Sumatera Selatan') matchChip = String(alumni.domisili).includes('Sumatera Selatan') || String(alumni.site).includes('Sumatera Selatan');
          }
          return matchSearch && matchChip && matchAngkatan;
        });
      }, [alumniData, searchTerm, activeChip, filterAngkatan]);

      const locationGroups = useMemo(() => {
        const groups = {};

        filteredData.forEach(alumni => {
          const region = getRegionInfo(alumni);
          
          if (region.id === 'belum_ada') return;

          if (!groups[region.id]) {
            groups[region.id] = {
              id: region.id,
              name: region.name,
              coordinates: [region.lat, region.lng],
              alumni: [],
              companies: new Set()
            };
          }
          
          groups[region.id].alumni.push(alumni);
          if (alumni.perusahaan) {
            groups[region.id].companies.add(alumni.perusahaan);
          }
        });

        return Object.values(groups).sort((a, b) => b.alumni.length - a.alumni.length);
      }, [filteredData]);

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3500);
      };

      const handlePhotoUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 3 * 1024 * 1024) {
          showToast('Ukuran foto maksimal 3MB. Harap perkecil ukuran foto Kamu.');
          return;
        }

        setIsUploadingPhoto(true);
        const reader = new FileReader();
        
        reader.onload = async (event) => {
          const base64Data = event.target.result.split(',')[1];
          
          try {
            const res = await fetch(API_URL, {
              method: 'POST',

        setIsLoading(true);
        const normalizePhone = (p) => {
          if (!p) return '';
          let str = String(p).replace(/[^0-9]/g, '');
          if (str.startsWith('0')) return str.substring(1);
          if (str.startsWith('62')) return str.substring(2);
          return str;
        };

        let phoneToSend = normalizePhone(authForm.phone);

        try {
          const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              action: 'recoverPassword',
              phone: phoneToSend,
              nama: authForm.nama,
              email: authForm.email
            })
          });
          const result = await res.json();

          if (result.status === 'success') {
            setAuthForm({ ...authForm, recoveredPass: result.password });
            showToast('Sandi berhasil diverifikasi.');
          } else {
            showToast(result.message);

          showToast('Koneksi bermasalah saat memverifikasi data.');

        setIsLoading(false);
      };

          if (str.startsWith('62')) return str.substring(2);
          return str;

                      <React.Fragment>
                        <img src={getDriveImageLink(alumni.foto)} alt={alumni.nama} className="w-10 h-10 rounded-full object-cover shrink-0" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                        <div className="w-10 h-10 rounded-full bg-purple-100 items-center justify-center font-bold text-[#5D4C8C] text-sm shrink-0" style={{ display: 'none' }}>{getInitials(alumni.nama)}</div>
                      </React.Fragment>
                    ) : (
                      <div className="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center font-bold text-[#5D4C8C] text-sm shrink-0">{getInitials(alumni.nama)}</div>
                    )}
                    <div className="flex-1 min-w-0">
                      <h3 className="text-sm font-semibold text-gray-800 truncate">{alumni.nama}</h3>
                      <p className="text-xs text-gray-500 truncate">{alumni.perusahaan ? `${alumni.perusahaan} - ${alumni.domisili}` : alumni.domisili}</p>
                    </div>
                    <button className="px-3 py-1.5 rounded-lg bg-purple-50 text-[#5D4C8C] text-xs font-semibold">Profil</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {selectedAlumni && !isEditingProfile && (
            <div className="fixed inset-0 z-50 flex items-end justify-center bg-gray-900/60 backdrop-blur-sm">
              <div className="bg-white w-full sm:w-96 rounded-t-3xl shadow-2xl overflow-hidden flex flex-col relative" style={{ maxHeight: '90vh' }}>
                {currentUser.role === 'admin' && (
                  <button onClick={() => startEditing(selectedAlumni)} className="absolute top-4 left-4 p-2 bg-white/20 text-white rounded-full hover:bg-white/40 z-10 flex items-center gap-1 text-xs font-bold"><Edit size={14} /> Edit</button>
                )}
                <div className="relative h-32 bg-[#5D4C8C] shrink-0">
                  <button onClick={() => setSelectedAlumni(null)} className="absolute top-4 right-4 p-1.5 bg-black/20 text-white rounded-full"><X size={20} /></button>
                </div>
                
                <div className="absolute top-16 left-0 w-full flex justify-center z-10 pointer-events-none">
                  <div className="w-32 h-32 rounded-full border-4 border-white bg-white shadow-md overflow-hidden flex items-center justify-center pointer-events-auto">
                    {getDriveImageLink(selectedAlumni.foto) ? (
                      <React.Fragment>
                        <img src={getDriveImageLink(selectedAlumni.foto)} alt={selectedAlumni.nama} className="w-full h-full object-cover shrink-0" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                        <div className="w-full h-full bg-gradient-to-br from-[#5D4C8C] to-[#D4AF37] items-center justify-center text-white text-4xl font-bold shrink-0" style={{ display: 'none' }}>{getInitials(selectedAlumni.nama)}</div>
                      </React.Fragment>
                    ) : (
                      <div className="w-full h-full bg-gradient-to-br from-[#5D4C8C] to-[#D4AF37] flex items-center justify-center text-white text-4xl font-bold shrink-0">{getInitials(selectedAlumni.nama)}</div>
                    )}
                  </div>
                </div>

                <div className="px-6 pb-6 pt-20 relative flex-1 overflow-y-auto">
                  <div className="text-center mb-6">
                    <h2 className="text-2xl font-bold text-gray-800">{selectedAlumni.nama}</h2>
                    <p className="text-[#5D4C8C] font-semibold mt-1">Angkatan {selectedAlumni.angkatan}</p>
                    <p className="text-sm text-gray-500 mt-1">{selectedAlumni.pekerjaan}</p>
                  </div>
                  <div className="space-y-4">
                    <div className="bg-gray-50 rounded-xl p-4 flex gap-4 items-start border border-gray-100">
                      <Briefcase className="text-[#D4AF37] shrink-0 mt-0.5" size={20} />
                      <div><p className="text-xs text-gray-500 font-medium uppercase tracking-wider">Pekerjaan</p><p className="font-semibold text-gray-800 mt-0.5">{selectedAlumni.jabatan}</p><p className="text-sm text-gray-600">{selectedAlumni.perusahaan}</p></div>
                    </div>
                    <div className="bg-gray-50 rounded-xl p-4 flex gap-4 items-start border border-gray-100">
                      <MapPin className="text-[#5D4C8C] shrink-0 mt-0.5" size={20} />
                      <div>
                        <p className="text-xs text-gray-500 font-medium uppercase tracking-wider">Domisili</p>
                        <p className="font-semibold text-gray-800 mt-0.5">{selectedAlumni.domisili || '-'}</p>
                        <p className="text-sm text-gray-600">Site {selectedAlumni.site || '-'}</p>
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div className="bg-gray-50 rounded-xl p-4 flex flex-col gap-2 border border-gray-100 items-center text-center">
                        <Phone className="text-[#5D4C8C]" size={20} />
                        <div>
                          <p className="text-xs text-gray-500 font-medium mb-1">WhatsApp</p>
                          {canViewContact ? (
                            <a href={`https://wa.me/${String(selectedAlumni.hp || '').replace(/[^0-9]/g, '')}`} target="_blank" className="text-sm font-semibold text-blue-600 hover:underline">Hubungi</a>
                          ) : (
                            <span className="text-xs font-semibold text-gray-400 flex items-center gap-1 justify-center"><Lock size={12}/> Seangkatan</span>
                          )}
                        </div>
                      </div>
                      <div className="bg-gray-50 rounded-xl p-4 flex flex-col gap-2 border border-gray-100 items-center text-center">
                        <Mail className="text-[#D4AF37]" size={20} />
                        <div className="w-full">
                          <p className="text-xs text-gray-500 font-medium mb-1">Email</p>
                          {canViewContact ? (
                            <p className="text-xs font-semibold text-gray-800 truncate w-full">{selectedAlumni.email || 'Tersedia'}</p>
                          ) : (
                            <p className="text-xs font-semibold text-gray-400 truncate w-full flex items-center gap-1 justify-center"><Lock size={12}/> Rahasia</p>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {isEditingProfile && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4">
              <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl flex flex-col" style={{ maxHeight: '90vh' }}>
                <div className="bg-[#5D4C8C] p-4 flex justify-between items-center text-white rounded-t-2xl">
                  <h3 className="font-bold text-lg">Edit Profil</h3>
                  <button onClick={() => setIsEditingProfile(false)} className="p-1 hover:bg-white/20 rounded-full"><X size={20} /></button>
                </div>
                <div className="p-4 overflow-y-auto flex-1 space-y-4 text-sm">
                  
                  <div className="flex flex-col items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <div className="w-20 h-20 rounded-full border-2 border-white shadow-sm overflow-hidden mb-3 bg-white flex items-center justify-center relative">
                      {isUploadingPhoto && (
                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center z-10">
                          <Loader2 className="animate-spin text-white" size={20} />
                        </div>
                      )}
                      {getDriveImageLink(editFormData.foto) ? (
                        <img src={getDriveImageLink(editFormData.foto)} alt="Preview" className="w-full h-full object-cover" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                      ) : (
                        <span className="text-gray-400 font-bold text-xl">{getInitials(editFormData.nama)}</span>
                      )}
                    </div>
                    
                    <div className="w-full relative">
                      <input 
                        type="file" 
                        accept="image/*" 
                        onChange={handlePhotoUpload}
                        className="hidden" 
                        id="foto-upload"
                      />
                      <label htmlFor="foto-upload" className="w-full flex items-center justify-center gap-2 bg-white border-2 border-dashed border-[#5D4C8C] text-[#5D4C8C] px-3 py-2.5 rounded-lg text-xs font-bold cursor-pointer hover:bg-purple-50 transition-colors">
                        <UploadCloud size={16} /> Pilih & Unggah Foto Baru
                      </label>
                      <p className="text-[10px] text-gray-500 text-center mt-2">Maksimal ukuran 3MB. Foto akan langsung tersimpan.</p>
                    </div>
                  </div>

                  <div><label className="text-gray-500 font-semibold mb-1 block">Nama Lengkap</label><input type="text" className="w-full p-2.5 border rounded-lg" value={editFormData.nama || ''} onChange={e => setEditFormData({ ...editFormData, nama: e.target.value })} /></div>
                  <div><label className="text-gray-500 font-semibold mb-1 block">Perusahaan</label><input type="text" className="w-full p-2.5 border rounded-lg" value={editFormData.perusahaan || ''} onChange={e => setEditFormData({ ...editFormData, perusahaan: e.target.value })} /></div>
                  <div><label className="text-gray-500 font-semibold mb-1 block">Jabatan</label><input type="text" className="w-full p-2.5 border rounded-lg" value={editFormData.jabatan || ''} onChange={e => setEditFormData({ ...editFormData, jabatan: e.target.value })} /></div>
                  
                  <div><label className="text-gray-500 font-semibold mb-1 block">Kota Domisili (Acuan Peta)</label><input type="text" className="w-full p-2.5 border rounded-lg" value={editFormData.domisili || ''} onChange={e => setEditFormData({ ...editFormData, domisili: e.target.value })} /></div>
                  <div><label className="text-gray-500 font-semibold mb-1 block">Lokasi Kerja / Site</label><input type="text" className="w-full p-2.5 border rounded-lg" value={editFormData.site || ''} onChange={e => setEditFormData({ ...editFormData, site: e.target.value })} /></div>

                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-gray-500 font-semibold mb-1 block">Angkatan</label><input type="text" className="w-full p-2.5 border rounded-lg" value={editFormData.angkatan || ''} onChange={e => setEditFormData({ ...editFormData, angkatan: e.target.value })} /></div>
                    <div><label className="text-gray-500 font-semibold mb-1 block">Sektor Tambang?</label><select className="w-full p-2.5 border rounded-lg bg-white" value={editFormData.sesuaiBidang || 'YA'} onChange={e => setEditFormData({ ...editFormData, sesuaiBidang: e.target.value })}><option value="YA">Ya (Sesuai)</option><option value="TIDAK">Lainnya</option></select></div>
                  </div>
                </div>
                <div className="p-4 border-t bg-gray-50 rounded-b-2xl">
                  <button onClick={saveProfile} className="w-full py-3 bg-[#D4AF37] text-white rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-[#b08d24]"><Save size={18} /> Simpan Perubahan</button>
                </div>
              </div>
            </div>
          )}

          {isAddingEvent && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4">
              <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl flex flex-col" style={{ maxHeight: '90vh' }}>
                <div className="bg-[#D4AF37] p-4 flex justify-between items-center text-white rounded-t-2xl">
                  <h3 className="font-bold text-lg">Tambah Event Baru</h3>
                  <button onClick={() => setIsAddingEvent(false)} className="p-1 hover:bg-black/10 rounded-full"><X size={20} /></button>
                </div>
                <div className="p-4 overflow-y-auto flex-1 space-y-4 text-sm">
                  <div><label className="text-gray-500 font-semibold mb-1 block">Judul Event</label><input type="text" className="w-full p-2.5 border rounded-lg" placeholder="Misal Buka Bersama 2026" value={eventFormData.title} onChange={e => setEventFormData({ ...eventFormData, title: e.target.value })} /></div>
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-gray-500 font-semibold mb-1 block">Tanggal</label><input type="text" className="w-full p-2.5 border rounded-lg" placeholder="15 Agustus 2026" value={eventFormData.date} onChange={e => setEventFormData({ ...eventFormData, date: e.target.value })} /></div>
                    <div><label className="text-gray-500 font-semibold mb-1 block">Waktu</label><input type="text" className="w-full p-2.5 border rounded-lg" placeholder="09:00 WIB" value={eventFormData.time} onChange={e => setEventFormData({ ...eventFormData, time: e.target.value })} /></div>
                  </div>
                  <div><label className="text-gray-500 font-semibold mb-1 block">Lokasi</label><input type="text" className="w-full p-2.5 border rounded-lg" placeholder="Nama Tempat / Link" value={eventFormData.location} onChange={e => setEventFormData({ ...eventFormData, location: e.target.value })} /></div>
                  <div><label className="text-gray-500 font-semibold mb-1 block">Kategori</label><select className="w-full p-2.5 border rounded-lg bg-white" value={eventFormData.type} onChange={e => setEventFormData({ ...eventFormData, type: e.target.value })}><option value="Organisasi">Organisasi</option><option value="Edukasi">Edukasi / Webinar</option><option value="Sosial">Sosial / Santai</option><option value="Olahraga">Olahraga</option></select></div>
                </div>
                <div className="p-4 border-t bg-gray-50 rounded-b-2xl">
                  <button onClick={saveNewEvent} className="w-full py-3 bg-[#5D4C8C] text-white rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-[#4a3c70]"><Save size={18} /> Publish Event</button>
                </div>
              </div>
            </div>
          )}

          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 pb-safe pt-2 px-6 z-40">
            <div className="flex justify-between items-center pb-4">
              <button onClick={() => setCurrentPage('home')} className={`flex flex-col items-center gap-1 ${currentPage === 'home' ? 'text-[#5D4C8C]' : 'text-gray-500'}`}><Home size={24} /><span className="text-[10px] font-medium">Home</span></button>
              <button onClick={() => setCurrentPage('directory')} className={`flex flex-col items-center gap-1 ${currentPage === 'directory' ? 'text-[#5D4C8C]' : 'text-gray-500'}`}><Users size={24} /><span className="text-[10px] font-medium">Direktori</span></button>
              <div className="relative -top-5">
                <button onClick={() => setCurrentPage('map')} className={`h-14 w-14 rounded-full bg-[#D4AF37] text-white shadow-lg flex items-center justify-center ring-4 ring-gray-100 ${currentPage === 'map' ? 'scale-110' : ''}`}><MapIcon size={26} /></button>
              </div>
              <button onClick={() => setCurrentPage('events')} className={`flex flex-col items-center gap-1 ${currentPage === 'events' ? 'text-[#5D4C8C]' : 'text-gray-500'}`}><CheckCircle2 size={24} /><span className="text-[10px] font-medium">Pemilu</span></button>
              <button onClick={() => setCurrentPage('profile')} className={`flex flex-col items-center gap-1 ${currentPage === 'profile' ? 'text-[#5D4C8C]' : 'text-gray-500'}`}><User size={24} /><span className="text-[10px] font-medium">Akun</span></button>
            </div>
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
